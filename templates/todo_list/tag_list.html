{% extends "base.html" %}

{% block content %}

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="mb-0">Tags</h1>
    <a class="btn btn-success" href="{% url 'todo-list:tag-create' %}">
      <i class="bi bi-plus-circle"></i> Add tag
    </a>
  </div>

  {% if tag_list %}
    <div class="table-responsive">
      <table class="table table-striped align-middle">
        <thead>
          <tr>
            <th>Name</th>
            <th>Update</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody>
          {% for tag in tag_list %}
            <tr>
              <td>{{ tag.name }}</td>
              
              <td>
                <a class="btn btn-secondary btn-sm" href="{% url 'todo-list:tag-update' tag.pk %}">
                  <i class="bi bi-arrow-clockwise"></i> Update
                </a>
              </td>

              <td>
                <a class="btn btn-danger btn-sm" href="{% url 'todo-list:tag-delete' tag.pk %}">
                  <i class="bi bi-trash-fill"></i> Delete
                </a>
              </td>
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  
  {% else %}
    <h3>There are no tags available.</h3>
  {% endif %}
</div>

{% endblock %}
